<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日四象限</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f4f0e6'/%3E%3Cpath d='M32 10v44M10 32h44' stroke='%23c75233' stroke-width='5' stroke-linecap='round'/%3E%3Ccircle cx='22' cy='22' r='5' fill='%230f6e56'/%3E%3Ccircle cx='42' cy='22' r='5' fill='%23a8401f'/%3E%3Ccircle cx='22' cy='42' r='5' fill='%23756d5e'/%3E%3Ccircle cx='42' cy='42' r='5' fill='%238a5d10'/%3E%3C/svg%3E"
    />
    <script>
      // 在 React 加载前就把主题定好,避免深色模式下页面先白一下再变黑
      const saved = localStorage.getItem('qb-theme')
      const dark =
        saved === 'dark' ||
        ((saved === 'system' || !saved) && matchMedia('(prefers-color-scheme: dark)').matches)
      document.documentElement.dataset.theme = dark ? 'dark' : 'light'
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

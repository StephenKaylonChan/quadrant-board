# 一条命令启动前后端:docker compose up -d
# 前后端代码都挂载进容器,改完保存即自动生效(热重载)
services:
  backend:
    build: ./backend
    environment:
      TZ: Asia/Shanghai # 容器默认是 UTC 时区,不设这个"今天"会差 8 小时
      # AI 拆任务用的大模型配置,值来自同目录的 .env 文件(compose 自动读取)
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      CHAT_MODEL: ${CHAT_MODEL:-qwen-plus}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ./backend/app:/code/app
      - ./data:/code/data # 数据库和图片都落在宿主机 ./data,删容器也不丢
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      TZ: Asia/Shanghai
    # 每次启动先 npm install(已装过时几秒跳过),再起 Vite 开发服务器
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules # node_modules 留在容器卷里,不污染宿主机
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
